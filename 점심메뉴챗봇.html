<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍱 점심메뉴 챗봇</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f3f5f9;
}

.chat{
    max-width:600px;
    margin:30px auto;
    background:white;
    height:90vh;
    border-radius:15px;
    display:flex;
    flex-direction:column;
    box-shadow:0 0 15px rgba(0,0,0,.15);
}

.header{
    background:#ff9800;
    color:white;
    text-align:center;
    padding:18px;
    font-size:24px;
    font-weight:bold;
    border-radius:15px 15px 0 0;
}

.messages{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.msg{
    margin:10px 0;
    max-width:75%;
    padding:12px;
    border-radius:12px;
    line-height:1.5;
}

.bot{
    background:#eeeeee;
}

.user{
    background:#ff9800;
    color:white;
    margin-left:auto;
}

.input-area{
    display:flex;
    padding:10px;
    border-top:1px solid #ddd;
}

input{
    flex:1;
    padding:12px;
    font-size:16px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    margin-left:10px;
    padding:12px 20px;
    background:#ff9800;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#f57c00;
}
</style>

</head>
<body>

<div class="chat">

<div class="header">
🍱 점심메뉴 챗봇
</div>

<div class="messages" id="messages">

<div class="msg bot">
안녕하세요😊<br><br>
오늘 점심 뭐 먹을지 고민되시나요?<br><br>

예시<br>
• 한식<br>
• 중식<br>
• 일식<br>
• 양식<br>
• 매운 거<br>
• 국물<br>
• 가성비<br>
• 아무거나
</div>

</div>

<div class="input-area">
<input id="input" placeholder="메뉴를 입력하세요..." onkeypress="if(event.key==='Enter')reply()">
<button onclick="reply()">전송</button>
</div>

</div>

<script>

const menus={
한식:[
"제육볶음",
"김치찌개",
"된장찌개",
"비빔밥",
"불고기",
"순두부찌개",
"삼겹살"
],

중식:[
"짜장면",
"짬뽕",
"마라탕",
"마라샹궈",
"탕수육",
"볶음밥"
],

일식:[
"돈까스",
"초밥",
"우동",
"라멘",
"규동",
"가츠동"
],

양식:[
"파스타",
"피자",
"햄버거",
"스테이크",
"리조또"
],

매운:[
"마라탕",
"불닭",
"제육볶음",
"짬뽕",
"닭갈비"
],

국물:[
"김치찌개",
"순두부찌개",
"짬뽕",
"우동",
"쌀국수"
],

가성비:[
"김밥",
"컵밥",
"국밥",
"라면",
"떡볶이"
]
};

const all=[
"김치찌개","제육볶음","비빔밥","삼겹살","불고기",
"마라탕","짜장면","짬뽕","볶음밥","탕수육",
"돈까스","초밥","우동","라멘",
"파스타","피자","햄버거","리조또",
"쌀국수","국밥","김밥","떡볶이"
];

function add(text,type){
const div=document.createElement("div");
div.className="msg "+type;
div.innerHTML=text;
document.getElementById("messages").appendChild(div);
document.getElementById("messages").scrollTop=document.getElementById("messages").scrollHeight;
}

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function reply(){

const input=document.getElementById("input");
const text=input.value.trim();

if(text=="") return;

add(text,"user");

let answer="";

if(text.includes("한식"))
answer=random(menus.한식);

else if(text.includes("중식"))
answer=random(menus.중식);

else if(text.includes("일식"))
answer=random(menus.일식);

else if(text.includes("양식"))
answer=random(menus.양식);

else if(text.includes("매운"))
answer=random(menus.매운);

else if(text.includes("국물"))
answer=random(menus.국물);

else if(text.includes("가성비"))
answer=random(menus.가성비);

else if(text.includes("아무"))
answer=random(all);

else
answer=random(all);

setTimeout(()=>{
add("🍴 오늘의 추천 메뉴는<br><br><b>"+answer+"</b> 입니다! 😋","bot");
},500);

input.value="";

}

</script>

</body>
</html>
